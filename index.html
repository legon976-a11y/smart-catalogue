<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Catalog Builder | LEGON</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brandGray: '#bdbdbd',
                        brandText: '#4a4a4a',
                        softGray: '#eef0ef',
                        softPink: '#f9f2eb',
                        softBeige: '#fcfaf6',
                        softWarm: '#fdfbf7',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-sans text-brandText overflow-x-hidden">

    <!-- Builder Overlay (Admin Controls) -->
    <div id="catalog-builder-toolbar" class="fixed top-6 right-[400px] z-50 bg-white/90 backdrop-blur-md px-6 py-4 rounded-full shadow-2xl border border-gray-100 flex items-center gap-6 print:hidden transition-transform duration-300">
        <div class="flex items-center gap-3 border-r border-gray-200 pr-6">
            <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center text-xs">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Category Theme</p>
                <select id="category-theme-select" class="text-xs font-bold text-gray-800 bg-transparent outline-none cursor-pointer">
                    <option value="luxury">🏠 Гэр ахуй, Тавилга</option>
                    <option value="kids">👶 Хүүхдийн бараа</option>
                    <option value="food">🛍️ Хүнс, Ундаа</option>
                    <option value="fashion">👕 Хувцас, Загвар</option>
                    <option value="shoes">👟 Гутал</option>
                    <option value="bags">👜 Цүнх, Аксессуар</option>
                    <option value="toys">🧸 Тоглоом</option>
                    <option value="beauty">💄 Гоо сайхан</option>
                    <option value="household">🧴 Ахуйн бараа</option>
                    <option value="electronics">📱 Цахилгаан бараа</option>
                    <option value="sport">🏋️ Спортын бараа</option>
                    <option value="auto">🚗 Авто бараа</option>
                    <option value="pets">🐶 Амьтны бараа</option>
                    <option value="books">📚 Ном, Бичиг хэрэг</option>
                    <option value="gifts">🎁 Бэлгийн бараа</option>
                    <option value="travel">✈️ Аялал, Гадаарт</option>
                    <option value="tools">🛠️ Барилга, Багаж</option>
                    <option value="health">💊 Эм, Эрүүл мэнд</option>
                </select>
            </div>
        </div>
        
        <button id="add-product-btn" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition flex items-center gap-2">
            <i class="fa-solid fa-plus-circle"></i> Бараа оруулах
        </button>
        <button id="print-catalog-btn" class="text-sm font-bold text-gray-600 hover:text-black transition flex items-center gap-2">
            <i class="fa-solid fa-print"></i> PDF татах
        </button>
    </div>

    <!-- Product Picker Modal -->
    <div id="product-modal" class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm hidden flex items-center justify-center p-4 print:hidden opacity-0 transition-opacity">
        <div class="bg-white max-w-4xl w-full max-h-[80vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="product-modal-card">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div>
                    <h2 class="text-xl font-bold font-serif text-gray-800">Бараа нэмэх</h2>
                    <p class="text-xs text-gray-500 mt-1">Зөвхөн сонгоход л систем автоматаар тансаг загварт байршуулна.</p>
                </div>
                <button id="close-modal-btn" class="w-10 h-10 rounded-full bg-white border border-gray-200 text-gray-400 hover:text-gray-700 flex items-center justify-center shadow-sm transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto bg-gray-50/50 grid grid-cols-2 md:grid-cols-4 gap-4" id="mock-product-list">
                <!-- Products rendered via JS -->
            </div>
        </div>
    </div>


    <!-- ==========================================
         ACTUAL CATALOG LAYOUT (Viewer)
         ========================================== -->
    <main class="relative" id="catalog-container">
        
        <!-- Fixed Brand Logo -->
        <div class="fixed top-12 left-12 z-40 bg-white/80 p-2 rounded-full mix-blend-multiply w-12 h-12 flex items-center justify-center border border-gray-200">
            <span class="font-bold text-[10px] tracking-widest">LEGON</span>
        </div>

        <!-- Fixed Right Navigation (as in image) -->
        <nav class="fixed top-0 right-0 w-[300px] h-screen bg-[#c8ced0] z-40 p-8 flex flex-col text-white transform translate-x-0 transition-transform hidden lg:flex">
            <div class="ml-auto mb-16">
                <button class="w-10 h-10 bg-white/20 hover:bg-white/40 rounded transition flex items-center justify-center">
                    <i class="fa-solid fa-bars text-white"></i>
                </button>
            </div>
            
            <div class="grid grid-cols-2 gap-8 gap-y-12">
                <div class="nav-item group cursor-pointer text-center">
                    <div class="h-10 flex items-center justify-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/3233/3233157.png" class="h-8 opacity-80 invert mix-blend-screen group-hover:scale-110 transition">
                    </div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 group-hover:opacity-100 transition">Tables</span>
                </div>
                <div class="nav-item group cursor-pointer text-center">
                    <div class="h-10 flex items-center justify-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/2611/2611026.png" class="h-8 opacity-80 invert mix-blend-screen group-hover:scale-110 transition">
                    </div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 group-hover:opacity-100 transition">Chairs</span>
                </div>
                <div class="nav-item group cursor-pointer text-center">
                    <div class="h-10 flex items-center justify-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/10069/10069273.png" class="h-8 opacity-80 invert mix-blend-screen group-hover:scale-110 transition">
                    </div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 group-hover:opacity-100 transition">TV Sets</span>
                </div>
                <div class="nav-item group cursor-pointer text-center">
                    <div class="h-10 flex items-center justify-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/2857/2857416.png" class="h-8 opacity-80 invert mix-blend-screen group-hover:scale-110 transition">
                    </div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 group-hover:opacity-100 transition">Sofas</span>
                </div>
                <div class="nav-item group cursor-pointer text-center">
                    <div class="relative inline-block h-10 mb-3">
                        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                            <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" class="h-5 opacity-60 mix-blend-darken">
                        </div>
                        <span class="absolute -top-2 -right-2 bg-yellow-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center">3</span>
                    </div>
                    <span class="block text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 group-hover:opacity-100 transition">Cart</span>
                </div>
                <div class="nav-item group cursor-pointer text-center">
                    <div class="h-10 flex items-center justify-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/542/542638.png" class="h-8 opacity-80 invert mix-blend-screen group-hover:scale-110 transition">
                    </div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-80 group-hover:opacity-100 transition">Contact</span>
                </div>
            </div>

            <div class="mt-auto opacity-30 text-[8px] uppercase tracking-widest text-center">
                Legon Smart Layout © 2026<br>Premium Catalog
            </div>
        </nav>

        <!-- Dynamic sections will be injected here -->
        <div id="catalog-sections">
            <!-- Initial empty state -->
            <div id="empty-state" class="min-h-screen flex items-center justify-center pr-[300px] bg-softWarm">
                <div class="text-center">
                    <div class="w-24 h-24 mx-auto mb-6 bg-white rounded-full shadow-sm flex items-center justify-center text-gray-300">
                        <i class="fa-solid fa-box-open text-3xl"></i>
                    </div>
                    <h2 class="text-xl font-serif text-gray-400 italic mb-2">Каталог хоосон байна</h2>
                    <p class="text-xs tracking-widest text-gray-400 uppercase font-bold">Бараа оруулах товчийг дарна уу</p>
                </div>
            </div>
        </div>

        <footer class="py-12 bg-white flex flex-col items-center justify-center text-center mt-20 border-t border-gray-100 pr-[300px]">
            <div class="w-12 h-12 border border-gray-200 flex items-center justify-center mb-4">
                <span class="font-bold text-[8px] tracking-widest">LBL</span>
            </div>
            <p class="text-[9px] uppercase tracking-widest text-gray-400 font-bold mb-1">Copyright © LEGON CATALOG</p>
            <p class="text-[9px] text-gray-300 font-semibold italic">Designed by Antigravity AI</p>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
