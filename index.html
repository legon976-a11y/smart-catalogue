<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Catalog Pro v4.2</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="admin-panel">
        <header class="admin-header">
            <h2>Dursamj System <span>v4.2 Premium</span></h2>
        </header>

        <section class="grid-inputs">
            <div class="input-card">
                <label for="logoFile">1. Лого (Өнгө сорох)</label>
                <input type="file" id="logoFile" accept="image/*" title="Лого сонгох">
            </div>
            <div class="input-card">
                <label for="excelFile">2. Excel файл</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls" title="Excel файл">
            </div>
            <div class="input-card">
                <label for="wordFile">3. Word файл</label>
                <input type="file" id="wordFile" accept=".docx" title="Word файл">
            </div>
        </section>

        <section class="template-selector-container">
            <label class="section-label">4. Загвар сонгох:</label>
            <div class="template-grid">
                <div class="template-option active" data-style="beauty"><div class="thumb beauty-thumb"></div><span>Гоо сайхан</span></div>
                <div class="template-option" data-style="cosmetic"><div class="thumb cosmetic-thumb"></div><span>Цэвэрхэн</span></div>
                <div class="template-option" data-style="bakery"><div class="thumb bakery-thumb"></div><span>Амттан</span></div>
                <div class="template-option" data-style="market"><div class="thumb market-thumb"></div><span>Зах</span></div>
                <div class="template-option" data-style="magazine"><div class="thumb magazine-thumb"></div><span>Сэтгүүл</span></div>
                <div class="template-option" data-style="minimal"><div class="thumb minimal-thumb"></div><span>Тансаг</span></div>
            </div>
            <input type="hidden" id="templateSelect" value="beauty">
        </section>

        <footer class="action-bar">
            <div class="size-group">
                <label for="pageSize" class="visually-hidden">Хэмжээ сонгох</label>
                <select id="pageSize" title="Цаасны хэмжээ">
                    <option value="a4">A4 Хэмжээ</option>
                    <option value="a5">A5 Хэмжээ</option>
                </select>
            </div>
            <div class="btn-group">
                <button id="generateBtn" class="btn-primary">✨ Каталоги Үүсгэх</button>
                <button id="downloadBtn" class="btn-dark">📥 PDF Татах</button>
            </div>
        </footer>
    </div>

    <input type="file" id="hiddenBannerInput" class="hidden-input" accept="image/*" aria-label="Баннер">

    <main id="catalog-canvas" class="size-a4 beauty">
        <div class="placeholder-msg">Мэдээллээ оруулаад "Каталоги Үүсгэх" дарна уу.</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
