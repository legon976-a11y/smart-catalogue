<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dursamj Catalogue Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="admin-panel">
        <div class="admin-header">
            <h2>Dursamj <span>Catalogue Builder</span></h2>
            <p>Загвараа сонгоод Excel файлаа оруулна уу.</p>
        </div>

        <div class="template-selector-grid">
            <button class="template-card active" data-style="grid" title="Grid-based загвар сонгох">
                <span class="icon">📘</span>
                <span class="info"><strong>Grid-based</strong><span>Тор бүтэцтэй</span></span>
            </button>
            <button class="template-card" data-style="lifestyle" title="Lifestyle загвар сонгох">
                <span class="icon">📗</span>
                <span class="info"><strong>Lifestyle</strong><span>Storytelling</span></span>
            </button>
            <button class="template-card" data-style="premium" title="Minimal/Premium загвар сонгох">
                <span class="icon">📙</span>
                <span class="info"><strong>Minimal</strong><span>Luxury Focus</span></span>
            </button>
            <button class="template-card" data-style="editorial" title="Editorial загвар сонгох">
                <span class="icon">📕</span>
                <span class="info"><strong>Editorial</strong><span>Magazine Style</span></span>
            </button>
            <button class="template-card" data-style="technical" title="Technical загвар сонгох">
                <span class="icon">📒</span>
                <span class="info"><strong>Technical</strong><span>Specs & Detail</span></span>
            </button>
            <button class="template-card" data-style="single" title="Single Product загвар сонгох">
                <span class="icon">📓</span>
                <span class="info"><strong>Single Focus</strong><span>Hero Product</span></span>
            </button>
            <button class="template-card" data-style="hybrid" title="Hybrid загвар сонгох">
                <span class="icon">📔</span>
                <span class="info"><strong>Mixed</strong><span>Бүхний хослол</span></span>
            </button>
        </div>

        <div class="controls-row">
            <div class="input-group">
                <label for="excelFile">Excel файл (Data):</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls" title="Барааны дата файл">
            </div>
            <div class="input-group">
                <label for="orientation">Цаасны чиглэл:</label>
                <select id="orientation" title="Хэвтээ эсвэл босоо">
                    <option value="portrait">Босоо (Portrait)</option>
                    <option value="landscape">Хэвтээ (Landscape)</option>
                </select>
            </div>
            <div class="actions">
                <button id="generateBtn" class="btn-primary" title="Каталоги үүсгэх">Generate</button>
                <button id="downloadBtn" class="btn-dark" title="PDF татах">Download PDF</button>
            </div>
        </div>
    </div>

    <div id="catalog-canvas" class="size-a4 portrait grid">
        <div class="empty-state">Загвараа сонгоод Generate дарна уу...</div>
    </div>

    <input type="file" id="hiddenImgInput" class="visually-hidden" accept="image/*" title="Зураг солих">
    <script src="script.js"></script>
</body>
</html>
