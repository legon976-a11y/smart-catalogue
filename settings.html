<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тохиргоо | Legon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav mini-nav">
        <div class="nav-left">
            <button class="back-btn" id="back-to-index">‹ Буцах</button>
            <span class="brand-name italic-font">Систем тохиргоо</span>
        </div>
    </header>

    <main class="setup-container settings-form">
        <h2>Бизнес тохиргоо</h2>
        
        <div class="form-group">
            <label for="business-name">Бизнесийн нэр</label>
            <input type="text" id="business-name" class="catalog-title-input" value="Legon Branding Agency">
        </div>

        <div class="form-group">
            <label for="business-email">Мэйл хаяг</label>
            <input type="email" id="business-email" class="catalog-title-input" value="info@legon.mn">
        </div>

        <div class="form-group">
            <label for="currency-select">Үндсэн мөнгөн тэмдэгт</label>
            <select id="currency-select" class="catalog-title-input">
                <option value="MNT">Төгрөг (₮)</option>
                <option value="USD">Ам.Доллар ($)</option>
            </select>
        </div>

        <button class="btn-primary" id="save-settings-btn">Өөрчлөлтийг хадгалах</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
