<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Засварлах | Legon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
</head>
<body class="editing-mode">
    <header class="top-nav mini-nav">
        <div class="nav-left">
            <button class="back-btn" id="back-to-index">‹ Буцах</button>
            <span class="brand-name italic-font">Legon Editor</span>
        </div>
        <div class="nav-right">
            <button class="save-btn" id="save-catalog-btn">Хадгалах</button>
        </div>
    </header>

    <main class="split-view">
        <section class="canvas-panel">
            <div class="canvas-header">
                <span class="page-counter">2 бараа / 2 хуудас</span>
                <div class="pagination-controls">
                    <button class="prev" title="Өмнөх">‹</button>
                    <span class="current-page">1</span>
                    <button class="next" title="Дараах">›</button>
                </div>
            </div>
            
            <div class="page-preview">
                <div class="page-content-placeholder" id="main-preview">
                    <div class="grid-visualizer" id="grid-viz">
                        <div class="cell"></div>
                    </div>
                    <p class="italic-font">Бараа сонгох</p>
                    <span id="active-template-name">[Загвар: Үндсэн жагсаалт]</span>
                </div>
            </div>
        </section>

        <section class="config-panel">
            <div class="toggle-bar">
                <div class="toggle-switch" id="layout-toggle">
                    <span class="off active">Хаалттай</span>
                    <span class="slider"></span>
                </div>
                <label>Бүтэц ашиглах</label>
            </div>

            <section class="config-section">
                <h3>1. Хүснэгтийн хэмжээ</h3>
                <div class="grid-controls">
                    <div class="selected-grid-box active" id="display-size">1 x 1</div>
                    
                    <div class="grid-inputs">
                        <div class="input-field">
                            <label for="hor-count">Хэвтээ</label>
                            <select id="hor-count">
                                <option value="1">1</option><option value="2">2</option>
                                <option value="3">3</option><option value="4">4</option>
                            </select>
                        </div>
                        <div class="input-field">
                            <label for="ver-count">Босоо</label>
                            <select id="ver-count">
                                <option value="1">1</option><option value="2">2</option>
                                <option value="3">3</option><option value="4">4</option>
                            </select>
                        </div>
                    </div>
                </div>

                <p class="section-label">Түгээмэл хүснэгтүүд</p>
                <div class="predefined-grids">
                    <button class="grid-option" data-size="1x1">1x1</button>
                    <button class="grid-option" data-size="1x2">1x2</button>
                    <button class="grid-option" data-size="2x1">2x1</button>
                    <button class="grid-option" data-size="2x2">2x2</button>
                    <button class="grid-option" data-size="3x3">3x3</button>
                    <button class="grid-option" data-size="4x4">4x4</button>
                </div>
            </section>

            <section class="config-section">
                <div class="section-header">
                    <h3>2. Загвар сонгох</h3>
                    <button class="btn-outline-sm" id="new-template-btn">+ Шинэ</button>
                </div>

                <div class="template-options">
                    <div class="layout-card" data-name="Энгийн бараа"><div class="layout-thumb"></div><span>Энгийн</span></div>
                    <div class="layout-card active" data-name="Үндсэн жагсаалт"><div class="layout-thumb sheet"></div><span>Жагсаалт</span></div>
                    <div class="layout-card" data-name="Бүтэн хуудас"><div class="layout-thumb full"></div><span>Бүтэн</span></div>
                    <div class="layout-card" data-name="Lookbook Том"><div class="layout-thumb lookbook"></div><span>Lookbook</span></div>
                </div>
            </section>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
