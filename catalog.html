<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Catalog Editor | Legon</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="editor.css">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#6b21a8',
                        secondary: '#ec4899'
                    }
                }
            }
        }
    </script>

    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body class="bg-[#f0f2f5] overflow-hidden user-select-none antialiased h-screen flex flex-col text-slate-800">

    <!-- Top Navbar -->
    <header class="h-14 bg-white/80 backdrop-blur-md border-b border-white shadow-sm flex items-center justify-between px-6 z-50 shrink-0">
        <div class="flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="font-bold text-lg font-serif italic text-primary">Legon Editor <span class="text-xs bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full not-italic ml-2 font-sans">Pro</span></h1>
            
            <div class="h-6 w-px bg-slate-200 mx-2"></div>
            
            <!-- History Tools -->
            <button id="btn-undo" class="w-8 h-8 rounded hover:bg-slate-100 text-slate-500 flex items-center justify-center transition" title="Буцах">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button id="btn-redo" class="w-8 h-8 rounded hover:bg-slate-100 text-slate-500 flex items-center justify-center transition" title="Дахин хийх">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>

        <!-- Zoom & View Tools -->
        <div class="flex items-center gap-3 bg-slate-100/50 p-1 rounded-lg">
            <button id="btn-zoom-out" class="w-8 h-8 rounded bg-white shadow-sm text-slate-600 hover:text-primary transition flex items-center justify-center"><i class="fa-solid fa-minus text-xs"></i></button>
            <span id="zoom-level" class="text-xs font-semibold w-12 text-center text-slate-600">100%</span>
            <button id="btn-zoom-in" class="w-8 h-8 rounded bg-white shadow-sm text-slate-600 hover:text-primary transition flex items-center justify-center"><i class="fa-solid fa-plus text-xs"></i></button>
        </div>

        <div class="flex items-center gap-3">
            <button id="ai-magic-btn" class="px-4 py-2 rounded-xl bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white font-semibold text-sm shadow-md shadow-fuchsia-500/20 hover:shadow-lg hover:scale-105 transition-all flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> AI Туслах
            </button>
            <button id="download-btn" class="px-5 py-2 rounded-xl bg-slate-800 text-white font-medium text-sm hover:bg-slate-700 transition flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-download"></i> Татах
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Background decorative elements -->
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-violet-400/20 blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-pink-400/20 blur-[120px] pointer-events-none"></div>

        <!-- Left Tools Panel -->
        <aside class="w-[80px] bg-white/70 backdrop-blur-xl border-r border-white/50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] flex flex-col items-center py-4 gap-2 z-40 shrink-0">
            <button class="tool-btn active group" data-tool="select" title="Сонгох хэрэгсэл">
                <i class="fa-solid fa-arrow-pointer"></i>
                <span class="tool-label">Сонгох</span>
            </button>
            
            <button class="tool-btn group" data-tool="text" title="Текст бичих">
                <i class="fa-solid fa-t"></i>
                <span class="tool-label">Текст</span>
            </button>
            
            <div class="relative w-full flex justify-center group/img">
                <button class="tool-btn group" data-tool="image" id="tool-image-trigger" title="Зураг оруулах">
                    <i class="fa-regular fa-image"></i>
                    <span class="tool-label">Зураг</span>
                </button>
                <input type="file" id="image-upload" accept="image/*" class="hidden">
            </div>

            <button class="tool-btn group" data-tool="shape" title="Дүрс (Тэгш өнцөгт, Дугуй)">
                <i class="fa-solid fa-shapes"></i>
                <span class="tool-label">Дүрс</span>
            </button>

            <button class="tool-btn group" data-tool="eraser" title="Баллуур">
                <i class="fa-solid fa-eraser"></i>
                <span class="tool-label">Баллуур</span>
            </button>

            <button class="tool-btn group mt-auto bg-violet-50 text-violet-600 border-violet-200 hover:bg-violet-100 hover:border-violet-300 shadow-sm" data-tool="product" id="open-products-btn" title="Бараа байрлуулах">
                <i class="fa-solid fa-box-open"></i>
                <span class="tool-label">Бараа</span>
            </button>
        </aside>

        <!-- Tool Sub-panels (floating) -->
        <div id="shape-subpanel" class="absolute left-[90px] top-[240px] bg-white p-2 rounded-2xl shadow-xl border border-slate-100 hidden z-50 flex-col gap-2">
            <button class="shape-option p-3 hover:bg-slate-50 rounded-xl transition text-slate-600" data-shape="rect" title="Тэгш өнцөгт"><i class="fa-regular fa-square fa-xl"></i></button>
            <button class="shape-option p-3 hover:bg-slate-50 rounded-xl transition text-slate-600" data-shape="circle" title="Дугуй"><i class="fa-regular fa-circle fa-xl"></i></button>
            <button class="shape-option p-3 hover:bg-slate-50 rounded-xl transition text-slate-600" data-shape="line" title="Шулуун"><i class="fa-solid fa-minus fa-xl"></i></button>
        </div>

        <!-- Center Canvas -->
        <section class="flex-1 overflow-auto relative flex items-center justify-center p-8 bg-black/5" id="canvas-container-wrapper">
            <div id="canvas-wrapper" class="relative bg-white shadow-2xl transition-transform duration-200" style="width: 794px; height: 1123px;"> <!-- A4 format approx -->
                <canvas id="main-canvas" width="794" height="1123"></canvas>
            </div>
            
            <!-- Page controls (floating bottom center) -->
            <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-xl px-4 py-2 rounded-full shadow-lg border border-white flex items-center gap-4 z-40">
                <button class="text-slate-400 hover:text-slate-700 p-1"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="text-xs font-bold text-slate-600 tracking-widest uppercase">Хуудас 1 / 1</span>
                <button class="text-slate-400 hover:text-slate-700 p-1"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="w-px h-4 bg-slate-200 mx-1"></div>
                <button id="add-page-btn" class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 hover:bg-slate-200 transition" title="Хуудас нэмэх"><i class="fa-solid fa-plus text-[10px]"></i></button>
            </div>
        </section>

        <!-- Right Properties Panel -->
        <aside id="properties-panel" class="w-[280px] bg-white/80 backdrop-blur-xl border-l border-white shadow-[-4px_0_24px_rgba(0,0,0,0.02)] overflow-y-auto p-5 z-40 flex flex-col gap-6 shrink-0 transition-all duration-300 transform translate-x-0">
            
            <!-- Default / Document properties -->
            <div id="prop-document">
                <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Хуудасны тохиргоо</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">Зохиомж (Layout)</label>
                        <select id="doc-layout" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs text-slate-700 outline-none focus:border-violet-400 mb-2">
                            <option value="grid2">2 Багана (Grid)</option>
                            <option value="grid3">3 Багана (Grid)</option>
                            <option value="list">Жагсаалт (List)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">Хэмжээ</label>
                        <select id="doc-size" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs text-slate-700 outline-none focus:border-violet-400">
                            <option value="a4">A4 (Хэвлэх)</option>
                            <option value="square">Дөрвөлжин (Insta)</option>
                            <option value="story">Story (Утас)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold text-slate-600 mb-1 block">Дэвсгэр өнгө</label>
                        <div class="flex gap-2 items-center">
                            <input type="color" id="doc-bg-color" value="#ffffff" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                            <span id="doc-bg-hex" class="text-xs text-slate-500 uppercase font-mono">#FFFFFF</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Generic Object Properties (hidden initially) -->
            <div id="prop-object" class="hidden flex-col gap-6">
                <!-- Alignment -->
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Байрлал тэгшлэх</h3>
                    <div class="flex bg-slate-100 rounded-lg p-1">
                        <button class="flex-1 p-2 rounded hover:bg-white text-slate-600 shadow-sm transition align-btn" data-align="left"><i class="fa-solid fa-align-left"></i></button>
                        <button class="flex-1 p-2 rounded hover:bg-white text-slate-600 shadow-sm transition align-btn" data-align="center"><i class="fa-solid fa-align-center"></i></button>
                        <button class="flex-1 p-2 rounded hover:bg-white text-slate-600 shadow-sm transition align-btn" data-align="right"><i class="fa-solid fa-align-right"></i></button>
                    </div>
                </div>

                <!-- Colors & Stroke -->
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Өнгө / Хүрээ</h3>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <label class="text-[11px] font-semibold text-slate-600">Дүүргэлт (Fill)</label>
                            <input type="color" id="obj-fill" class="w-6 h-6 rounded cursor-pointer border border-slate-200">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-[11px] font-semibold text-slate-600">Хүрээ өнгө</label>
                            <input type="color" id="obj-stroke" class="w-6 h-6 rounded cursor-pointer border border-slate-200">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-[11px] font-semibold text-slate-600">Хүрээ зузаан</label>
                                <span class="text-[10px] text-slate-400" id="obj-stroke-width-val">0</span>
                            </div>
                            <input type="range" id="obj-stroke-width" min="0" max="20" value="0" class="w-full accent-primary">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-[11px] font-semibold text-slate-600">Тунгалаг (Opacity)</label>
                                <span class="text-[10px] text-slate-400" id="obj-opacity-val">100%</span>
                            </div>
                            <input type="range" id="obj-opacity" min="0" max="100" value="100" class="w-full accent-primary">
                        </div>
                    </div>
                </div>

                <!-- Text Specific -->
                <div id="prop-text" class="hidden">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Үсгийн хэв</h3>
                    <div class="space-y-3">
                        <select id="text-font" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs text-slate-700 outline-none">
                            <option value="Inter">Inter (Sans)</option>
                            <option value="Playfair Display">Playfair (Serif)</option>
                            <option value="Arial">Arial</option>
                            <option value="Times New Roman">Times New Roman</option>
                        </select>
                        <div class="flex gap-2">
                            <div class="flex-1 bg-slate-50 border border-slate-200 rounded-lg flex items-center px-2">
                                <input type="number" id="text-size" class="w-full bg-transparent text-xs text-slate-700 outline-none p-1" value="24">
                                <span class="text-[10px] text-slate-400">px</span>
                            </div>
                            <div class="flex bg-slate-100 rounded-lg p-1">
                                <button id="text-bold" class="w-8 h-8 rounded hover:bg-white text-slate-600 transition"><i class="fa-solid fa-bold"></i></button>
                                <button id="text-italic" class="w-8 h-8 rounded hover:bg-white text-slate-600 transition"><i class="fa-solid fa-italic"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Layer Ordering -->
                <div class="border-t border-slate-100 pt-4 mt-2">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Давхарга</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="layer-forward" class="py-2 px-3 bg-slate-50 hover:bg-slate-100 rounded-lg text-xs font-semibold text-slate-600 border border-slate-200 flex items-center justify-center gap-2 transition">
                            <i class="fa-solid fa-arrow-up-from-bracket"></i> Дээшлэх
                        </button>
                        <button id="layer-backward" class="py-2 px-3 bg-slate-50 hover:bg-slate-100 rounded-lg text-xs font-semibold text-slate-600 border border-slate-200 flex items-center justify-center gap-2 transition">
                            <i class="fa-solid fa-arrow-down-to-bracket"></i> Доошлох
                        </button>
                    </div>
                </div>

                <button id="obj-delete" class="w-full py-3 mt-4 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl text-xs font-bold border border-rose-100 transition shadow-sm">
                    <i class="fa-solid fa-trash-can mr-2"></i> Устгах
                </button>
            </div>
        </aside>
    </main>

    <!-- Product Picker Modal -->
    <div id="product-modal" class="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white max-w-4xl w-full max-h-[80vh] rounded-[32px] shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                    <h2 class="text-xl font-bold font-serif text-slate-800"><i class="fa-solid fa-boxes-stacked text-primary mr-2"></i> Бараа оруулах</h2>
                    <p class="text-xs text-slate-500 mt-1">Каталогт оруулах бараагаа сонгох эсвэл шинээр үүсгэнэ үү.</p>
                </div>
                <button id="close-product-modal" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-400 hover:text-slate-700 flex items-center justify-center shadow-sm transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <!-- Realistically we'd fetch this from state, but for standalone we mock it -->
            <div class="p-6 overflow-y-auto bg-slate-50/50 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="mock-product-list">
                <!-- Rendered via JS -->
            </div>
        </div>
    </div>

    <!-- AI Overlay -->
    <div id="ai-overlay" class="fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center">
        <div class="text-center">
            <div class="w-24 h-24 mx-auto mb-6 relative">
                <div class="absolute inset-0 bg-gradient-to-tr from-fuchsia-500 to-violet-500 rounded-full animate-spin blur-lg opacity-70"></div>
                <div class="w-full h-full bg-white rounded-full relative z-10 flex items-center justify-center text-3xl">✨</div>
            </div>
            <h2 class="text-3xl font-bold text-white font-serif mb-2">AI Дизайн бодож байна...</h2>
            <p class="text-slate-300">Фонтыг тохируулан, бүтцийг тэгшилж байна</p>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
